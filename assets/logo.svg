      <stop offset="0.48" stop-color="#165E7A"/>
      <stop offset="1" stop-color="#5E4AE3"/>
    </linearGradient>
    <linearGradient id="paper" x1="154" y1="122" x2="342" y2="322" gradientUnits="userSpaceOnUse">

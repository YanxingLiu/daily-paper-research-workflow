<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Daily Paper Research Workflow logo</title>
  <desc id="desc">A paper stack flowing through an AI spark into Zotero and Obsidian notes.</desc>
  <defs>

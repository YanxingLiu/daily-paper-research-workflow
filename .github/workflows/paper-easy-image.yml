name: Build Paper Easy image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/paper-easy-image.yml"
      - "paper-easy/**"
  pull_request:
    paths:
      - ".github/workflows/paper-easy-image.yml"
      - "paper-easy/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: paper-easy-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish Paper Easy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repository=ghcr.io/${owner}/paper-easy" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Paper Easy
            org.opencontainers.image.description=Self-hosted paper feed reader and MCP server for the Daily Paper Research Workflow.

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: paper-easy
          file: paper-easy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=paper-easy
          cache-to: type=gha,scope=paper-easy,mode=max

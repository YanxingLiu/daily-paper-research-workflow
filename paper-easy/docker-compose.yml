services:
  papers-easy:
    build:
      context: .
      dockerfile: Dockerfile
    image: papers-easy:local
    container_name: papers-easy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5174
      PAPERS_EASY_DB_PATH: ./data/papers.easy.sqlite
    volumes:
      - ./data:/app/data
    ports:
      - "5174:5174"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5174/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
